site_name: 喜马拉雅Ads
  #site_url: https://xmlyads.github.io
theme:
  name: material
  language: zh
  palette:
    scheme: slate
    primary: deep orange
    accent: indigo

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - 关于我们: index.md
  - Marketing API: 
    - 从这里开始: mktapi/start.md
    - 刷新accesstoken: mktapi/accessToken.md
    - 获取开发者广告账户授权信息: mktapi/queryDevInfo.md
    - 注册: mktapi/reg.md
    - 广告实体: mktapi/entities.md
  - About: about.md
  - Example: example.md
